<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Fake Review Detector</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            width: 100%;
            max-width: 600px;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            font-weight: 700;
            font-size: 2.5rem;
            color: #2c3e50;
            letter-spacing: 1px;
        }

        label {
            display: block;
            text-align: left;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #34495e;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid #ccc;
            border-radius: 10px;
            resize: vertical;
            transition: border-color 0.3s ease;
            font-family: inherit;
            outline: none;
        }

        textarea:focus {
            border-color: #3498db;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.4);
        }

        button {
            background-color: #3498db;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
            box-shadow: 0 8px 20px rgba(41, 128, 185, 0.6);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.3rem;
            color: #2c3e50;
            background-color: #ecf0f1;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
        }

        .original {
            color: #27ae60;
        }

        .fake {
            color: #c0392b;
        }

        #loading {
            display: none;
            margin-top: 10px;
            color: #7f8c8d;
            font-style: italic;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
    <script>
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Fake Review Detector</h1>
        <form method="POST" onsubmit="showLoading()">
            <label for="review">Enter a review:</label>
            <textarea id="review" name="review" placeholder="Type or paste a product review here..." required>{{ request.form.get('review', '') }}</textarea>

            <button type="submit">Check Review</button>
            <div id="loading">Analyzing review...</div>
        </form>

        {% if result %}
            <div class="result {% if result == 'Original Review' %}original{% else %}fake{% endif %}">
                Prediction: {{ result }} <br/>
                Probability: {{ probability|round(2) }}%
            </div>
        {% endif %}
    </div>
</body>
</html>
